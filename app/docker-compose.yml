services:
  mysql:
    image: mysql:8
    container_name: izk-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: izk_site
    ports:
      - "3306:3306"
    volumes:
      - izk_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  izk_mysql_data:
